name: Deploy AppForSale Docker Self Hosted

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: appforsale-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy AppForSale on EC2
    runs-on: [self-hosted, appforsale]

    steps:
      - name: Deploy latest code with Docker Compose
        run: |
          set -e

          echo "==== Current user ===="
          whoami

          echo "==== Go to project folder ===="
          cd /home/ubuntu/Appforsale-deploy

          echo "==== Pull latest code ===="
          git fetch origin main
          git reset --hard origin/main

          echo "==== Check required files ===="
          test -f docker-compose.yml || (echo "ERROR: docker-compose.yml missing" && exit 1)
          test -f .env || (echo "ERROR: root .env missing" && exit 1)
          test -f backend/appforsale/.env || (echo "ERROR: backend/appforsale/.env missing" && exit 1)

          echo "==== Docker version ===="
          sudo docker --version

          echo "==== Docker Compose version ===="
          sudo docker-compose --version

          echo "==== Docker Compose config check ===="
          sudo docker-compose config

          echo "==== Check MySQL container ===="
          MYSQL_STATUS=$(sudo docker inspect --format='{{.State.Status}}' appforsale-mysql 2>/dev/null || echo "missing")
          echo "MySQL status: $MYSQL_STATUS"

          if [ "$MYSQL_STATUS" = "missing" ]; then
            echo "MySQL missing. Starting full stack..."
            sudo docker-compose up -d --build
          else
            echo "MySQL exists. Checking MySQL ping..."
            sudo docker exec appforsale-mysql sh -lc 'mysqladmin ping -h127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"' || {
              echo "ERROR: MySQL is not responding. Deployment stopped safely."
              sudo docker ps -a
              exit 1
            }

            echo "==== Build backend and frontend only ===="
            sudo docker-compose build backend frontend

            echo "==== Recreate backend and frontend only ===="
            sudo docker-compose up -d --no-deps --force-recreate backend frontend
          fi

          echo "==== Docker status ===="
          sudo docker ps

          echo "==== Backend test ===="
          curl -I http://localhost:8080 || true

          echo "==== Frontend test ===="
          curl -I http://localhost:8081 || true

          echo "==== Deployment completed successfully ===="
